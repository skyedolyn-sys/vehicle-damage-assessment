# View authority weights for synthesizer conflict resolution.
# Each part declares its primary (canonical) and secondary (edge/glance) views.
# In Phase 1 this data is centralized; the consuming logic remains in
# agents/synthesizer.py.
#
# IMPORTANT: view ids must match the new 9-view schema (front_left, left, ...)
# used by view_agent / master_agent.  Legacy ids such as "front_left_45" or
# "left_90" are normalized at runtime but should not appear here.
default:
  # Per-part view priority table used by evidence_fusion.  Lower number =
  # more authoritative canonical view.  priority 99 = effectively invisible.
  # Must agree with primary_view and view_weights.primary (priority 0 set).
  part_view_priority:
    windshield_front:
      front: 0
      front_left: 1
      front_right: 1
      rear: 99
      rear_left: 99
      rear_right: 99
    windshield_rear:
      rear: 0
      rear_left: 1
      rear_right: 1
      front: 99
      front_left: 99
      front_right: 99
    sunroof_glass:
      top: 0
      left: 2
      right: 2
      front: 1
      front_left: 1
      front_right: 1
    roof_front:
      front: 0
      front_left: 1
      front_right: 1
    roof_middle:
      left: 0
      right: 0
      top: 0
      front: 1
      rear: 1
    roof_rear:
      rear: 0
      rear_left: 1
      rear_right: 1
    headlight_front_left:
      front: 0
      front_left: 0
      left: 0
    headlight_front_right:
      front: 0
      front_right: 0
      right: 0
    taillight_rear_left:
      rear: 0
      rear_left: 0
      left: 0
    taillight_rear_right:
      rear: 0
      rear_right: 0
      right: 0
    mirror_left:
      left: 0
      front_left: 1
      rear_left: 1
    mirror_right:
      right: 0
      front_right: 1
      rear_right: 1
    door_front_left:
      left: 0
      front_left: 1
      rear_left: 1
    door_front_right:
      right: 0
      front_right: 1
      rear_right: 1
    door_rear_left:
      left: 0
      rear_left: 1
      front_left: 1
    door_rear_right:
      right: 0
      rear_right: 1
      front_right: 1
    fender_front_right:
      front: 0
      front_right: 0
      right: 0
    hood:
      front: 0
      front_left: 1
      front_right: 1
    bumper_front:
      front: 0
      front_left: 1
      front_right: 1
    grille_front:
      front: 0
      front_left: 1
      front_right: 1
    fender_front_left:
      front: 0
      front_left: 0
      left: 0
    trunk_lid:
      rear: 0
      rear_left: 1
      rear_right: 1
    tailgate:
      rear: 0
      rear_left: 1
      rear_right: 1
    bumper_rear:
      rear: 0
      rear_left: 1
      rear_right: 1
    fender_rear_left:
      rear: 0
      rear_left: 0
      left: 0
    fender_rear_right:
      rear: 0
      rear_right: 0
      right: 0
    roof_rack:
      top: 0
      left: 1
      right: 1
      front: 1
      rear: 1

  primary_view:
    door_front_left:
      - left
    door_rear_left:
      - left
    door_front_right:
      - right
    door_rear_right:
      - right
    mirror_left:
      - left
    mirror_right:
      - right
    roof_front:
      - front
    roof_middle:
      - top
      - left
      - right
    roof_rear:
      - rear
    sunroof_glass:
      - top
    pillar_a_left:
      - front_left
    pillar_a_right:
      - front_right
    pillar_b_left:
      - left
    pillar_b_right:
      - right
    pillar_c_left:
      - rear_left
    pillar_c_right:
      - rear_right

  view_weights:
    door_front_left:
      primary:
        - left
      secondary:
        - front_left
        - rear_left
    door_rear_left:
      primary:
        - left
      secondary:
        - front_left
        - rear_left
    door_front_right:
      primary:
        - right
      secondary:
        - front_right
        - rear_right
    door_rear_right:
      primary:
        - right
      secondary:
        - rear_right
        - front_right
    mirror_left:
      primary:
        - left
      secondary:
        - front_left
        - rear_left
    mirror_right:
      primary:
        - right
      secondary:
        - front_right
        - rear_right
    roof_front:
      primary:
        - front
      secondary:
        - front_left
        - front_right
    roof_middle:
      primary:
        - top
        - left
        - right
      secondary:
        - front
        - rear
    roof_rear:
      primary:
        - rear
      secondary:
        - rear_left
        - rear_right
    sunroof_glass:
      primary:
        - top
      secondary:
        - front
        - front_left
        - front_right
        - rear
        - rear_left
        - rear_right
    pillar_a_left:
      primary:
        - front_left
      secondary:
        - left
        - top
    pillar_a_right:
      primary:
        - front_right
      secondary:
        - right
        - top
    pillar_b_left:
      primary:
        - left
      secondary:
        - front_left
        - rear_left
        - top
    pillar_b_right:
      primary:
        - right
      secondary:
        - front_right
        - rear_right
        - top
    pillar_c_left:
      primary:
        - rear_left
      secondary:
        - left
        - top
    pillar_c_right:
      primary:
        - rear_right
      secondary:
        - right
        - top

  roof_primary_regions:
    - top

  roof_secondary_regions:
    - left
    - right
    - front_left
    - front_right
    - rear
    - rear_left
    - rear_right

by_vehicle_type: {}
