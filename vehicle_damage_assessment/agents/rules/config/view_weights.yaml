# View authority weights for synthesizer conflict resolution.
# Each part declares its primary (canonical) and secondary (edge/glance) views.
# In Phase 1 this data is centralized; the consuming logic remains in
# agents/synthesizer.py.
#
# IMPORTANT: view ids must be STANDARD_VIEW ids (front_left_45, left_90, ...)
# as used by assessment_orchestrator/planner_agent.  Short aliases such as
# "left" or "front_left" are NOT matched at runtime.
default:
  # Per-part view priority table used by evidence_fusion.  Lower number =
  # more authoritative canonical view.  priority 99 = effectively invisible.
  # Must agree with primary_view and view_weights.primary (priority 0 set).
  part_view_priority:
    windshield_front:
      front: 0
      front_left_45: 1
      front_right_45: 1
      rear: 99
      rear_left_45: 99
      rear_right_45: 99
    windshield_rear:
      rear: 0
      rear_left_45: 1
      rear_right_45: 1
      front: 99
      front_left_45: 99
      front_right_45: 99
    sunroof_glass:
      top: 0
      left_90: 2
      right_90: 2
      front: 1
      front_left_45: 1
      front_right_45: 1
    roof_front:
      front: 0
      front_left_45: 1
      front_right_45: 1
    roof_middle:
      left_90: 0
      right_90: 0
      top: 0
      front: 1
      rear: 1
    roof_rear:
      rear: 0
      rear_left_45: 1
      rear_right_45: 1
    headlight_front_left:
      front: 0
      front_left_45: 0
      left_90: 0
    headlight_front_right:
      front: 0
      front_right_45: 0
      right_90: 0
    taillight_rear_left:
      rear: 0
      rear_left_45: 0
      left_90: 0
    taillight_rear_right:
      rear: 0
      rear_right_45: 0
      right_90: 0
    mirror_left:
      left_90: 0
      front_left_45: 1
      rear_left_45: 1
    mirror_right:
      right_90: 0
      front_right_45: 1
      rear_right_45: 1
    door_front_left:
      left_90: 0
      front_left_45: 1
      rear_left_45: 1
    door_front_right:
      right_90: 0
      front_right_45: 1
      rear_right_45: 1
    door_rear_left:
      left_90: 0
      rear_left_45: 1
      front_left_45: 1
    door_rear_right:
      right_90: 0
      rear_right_45: 1
      front_right_45: 1

  primary_view:
    door_front_left:
      - left_90
    door_rear_left:
      - left_90
    door_front_right:
      - right_90
    door_rear_right:
      - right_90
    mirror_left:
      - left_90
    mirror_right:
      - right_90
    roof_front:
      - front
    roof_middle:
      - top
      - left_90
      - right_90
    roof_rear:
      - rear
    sunroof_glass:
      - top
    pillar_a_left:
      - front_left_45
    pillar_a_right:
      - front_right_45
    pillar_b_left:
      - left_90
    pillar_b_right:
      - right_90
    pillar_c_left:
      - rear_left_45
    pillar_c_right:
      - rear_right_45

  view_weights:
    door_front_left:
      primary:
        - left_90
      secondary:
        - front_left_45
        - rear_left_45
    door_rear_left:
      primary:
        - left_90
      secondary:
        - front_left_45
        - rear_left_45
    door_front_right:
      primary:
        - right_90
      secondary:
        - front_right_45
        - rear_right_45
    door_rear_right:
      primary:
        - right_90
      secondary:
        - rear_right_45
        - front_right_45
    mirror_left:
      primary:
        - left_90
      secondary:
        - front_left_45
        - rear_left_45
    mirror_right:
      primary:
        - right_90
      secondary:
        - front_right_45
        - rear_right_45
    roof_front:
      primary:
        - front
      secondary:
        - front_left_45
        - front_right_45
    roof_middle:
      primary:
        - top
        - left_90
        - right_90
      secondary:
        - front
        - rear
    roof_rear:
      primary:
        - rear
      secondary:
        - rear_left_45
        - rear_right_45
    sunroof_glass:
      primary:
        - top
      secondary:
        - front
        - front_left_45
        - front_right_45
        - rear
        - rear_left_45
        - rear_right_45
    pillar_a_left:
      primary:
        - front_left_45
      secondary:
        - left_90
        - top
    pillar_a_right:
      primary:
        - front_right_45
      secondary:
        - right_90
        - top
    pillar_b_left:
      primary:
        - left_90
      secondary:
        - front_left_45
        - rear_left_45
        - top
    pillar_b_right:
      primary:
        - right_90
      secondary:
        - front_right_45
        - rear_right_45
        - top
    pillar_c_left:
      primary:
        - rear_left_45
      secondary:
        - left_90
        - top
    pillar_c_right:
      primary:
        - rear_right_45
      secondary:
        - right_90
        - top

  roof_primary_regions:
    - top

  roof_secondary_regions:
    - left_90
    - right_90
    - front_left_45
    - front_right_45
    - rear
    - rear_left_45
    - rear_right_45

by_vehicle_type: {}
